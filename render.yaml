services:
  # Backend Web Service (Free Tier)
  - type: web
    name: xenonedge-backend
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://xenonedge.vercel.app # Example: Update with your Vercel URL
      # Add MONGODB_URI, JWT_SECRET, and CLOUDINARY keys in Render Dashboard UI

  # Frontend Web Service (Optional - Vercel is recommended for free hosting)
  # - type: web
  #   name: xenonedge-frontend
  #   plan: free
  #   env: node
  #   rootDir: frontend
  #   buildCommand: npm install && npm run build
